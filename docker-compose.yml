services:
  postgres:
    image: postgres:16
    container_name: narrativewatch-postgres
    environment:
      POSTGRES_DB: narrativewatch
      POSTGRES_USER: nwuser
      POSTGRES_PASSWORD: nwpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nwuser -d narrativewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build: ./ml-service
    container_name: narrativewatch-ml
    ports:
      - "8000:8000"

  backend:
    build: .
    container_name: narrativewatch-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/narrativewatch
      SPRING_DATASOURCE_USERNAME: nwuser
      SPRING_DATASOURCE_PASSWORD: nwpass
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: