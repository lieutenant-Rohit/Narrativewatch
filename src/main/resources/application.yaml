spring:
  application:
    name: Narrativewatch

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/narrativewatch}
    username: ${SPRING_DATASOURCE_USERNAME:nwuser}
    password: ${SPRING_DATASOURCE_PASSWORD:nwpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.narrativewatch: INFO